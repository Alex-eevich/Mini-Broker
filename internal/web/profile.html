<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h2>Profile</h2>
    <div>Username: <span id = "Username"></span></div>
    <div>Birthday: <span id = "Birthday"></span></div>
    <div>Email: <span id = "Email"></span></div>
    <button id = "Verify">Verification</button>
    <div id="VerifyStatus"></div>
    <script>
        const button = document.getElementById("Verify");
        window.onload = async () => {

            const token = localStorage.getItem("token")

            const res = await fetch("/profile", {
                headers: {
                    Authorization: "Bearer " + token
                }
            })

            const user_data = await res.json()

            document.getElementById("Username").innerText = user_data.Username
            document.getElementById("Birthday").innerText = user_data.BirthDate
            document.getElementById("Email").innerText = user_data.Email
        };


        button.addEventListener('click', async (e) => {

            const resultDiv = document.getElementById('VerifyStatus');
            resultDiv.innerText = "Нажата кнопочка";
            const token = localStorage.getItem("token")

            const res = await fetch("/verified", {
                headers: {
                    Authorization: "Bearer " + token
                }
            })

            if (res.ok) {
                resultDiv.innerText = "Email подтвержден!";
            } else {
                resultDiv.innerText = "Error: " + res.statusText;
            }
        });
    </script>
</body>

</html>
