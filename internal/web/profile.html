<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h2>Profile</h2>
    <div>Username: <span id = "Username"></span></div>
    <div>Birthday: <span id = "Birthday"></span></div>
    <div>Email: <span id = "Email"></span></div>
    <button id = "Verify">Verification</button>
    <form id = "AddTokenForm">
        <label>Token:<input type="text" name="Token" required></label><br>
        <button type = "submit">Add token for trade</button>
    </form>
    <div id="ProfileStatus"></div>
    <div id="actions"></div>
    <script>
        const button = document.getElementById("Verify");

        window.onload = async () => {
            const token = localStorage.getItem("token")
            const res = await fetch("/profile", {
                headers: {
                    Authorization: "Bearer " + token
                }
            })
            const userData = await res.json()
            const tradeToken = await fetch("/checkTradeToken", {
                headers: {
                    Authorization: "Bearer " + token
                }
            })
            if (tradeToken.status === 200) {
                const tradeButton = document.createElement("button")
                tradeButton.innerText = "Go to TradePanel"
                document.body.appendChild(tradeButton)
                tradeButton.onclick = () => {
                    window.location.href = "/trade_panel.html"
                    window.location.href = "/trade_panel.html"
                }
            }
            document.getElementById("Username").innerText = userData.Username
            document.getElementById("Birthday").innerText = userData.BirthDate
            document.getElementById("Email").innerText = userData.Email
        };

        button.addEventListener('click', async (e) => {
            const resultDiv = document.getElementById('ProfileStatus');
            resultDiv.innerText = "Нажата кнопочка";
            const token = localStorage.getItem("token")
            const res = await fetch("/verified", {
                headers: {
                    Authorization: "Bearer " + token
                }
            })
            if (res.ok) {
                resultDiv.innerText = "Email подтвержден!";
            } else {
                resultDiv.innerText = "Error: " + res.statusText;
            }
        });

        const form = document.getElementById('AddTokenForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            const token = localStorage.getItem("token")
            const data = {
                token:      formData.get('Token'),
            };
            const resultDiv = document.getElementById('ProfileStatus');
            resultDiv.innerText = "Нажата кнопочка!";


            const res = await fetch('/addtoken', {
                method: 'POST',
                headers: {
                    Authorization: "Bearer " + token,
                    'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                resultDiv.innerText = "The token has been added!";
            } else if (res.status === 403) {
                resultDiv.innerText = "Error: The user has not been verified!";
            }  else if (res.status === 401) {
                resultDiv.innerText = "Error: The token has not been verified!";
            } else if (res.status === 402) {
                resultDiv.innerText = "Error: У вас уже есть токен!";
            } else {
                resultDiv.innerText = "Error: " + res.statusText;
            }
        });
    </script>
</body>

</html>
